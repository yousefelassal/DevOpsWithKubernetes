apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:
    hash-app-ingress
    # annotations:
    # nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          # Ping-pong app
          - path: /pingpong
            pathType: Prefix
            backend:
              service:
                name: ping-pong-svc
                port:
                  number: 2347
          # Main app
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hash-app-svc
                port:
                  number: 2346
