apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hash-app
  name: hash-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hash-app
  strategy: {}
  template:
    metadata:
      labels:
        app: hash-app
    spec:
      securityContext:
        fsGroup: 1000 # This is required to allow the containers to write to the shared volume, as they run as non-root users
      volumes:
        - name: log-volume
          persistentVolumeClaim:
            claimName: log-pvc
      containers:
        - image: bun-hash
          name: bun-hash
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: log-volume
              mountPath: /usr/src/app/files
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
        - image: file-reader
          name: file-reader
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: log-volume
              mountPath: /usr/src/app/files
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
status: {}
