apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ping-pong
  name: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  strategy: {}
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
        - image: ping-pong:0.0.2
          name: ping-pong
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
status: {}
