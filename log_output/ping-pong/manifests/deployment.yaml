apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ping-pong
  name: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  strategy: {}
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      securityContext:
        fsGroup: 1000 # This is required to allow the containers to write to the shared volume, as they run as non-root users
      volumes:
        - name: log-volume
          persistentVolumeClaim:
            claimName: log-pvc
      containers:
        - image: ping-pong
          name: ping-pong
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: log-volume
              mountPath: /usr/src/app/files
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
status: {}
